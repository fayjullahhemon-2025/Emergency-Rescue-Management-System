# ============================================
# Rescue Management System - Configuration
# ============================================

# Server
server.port=8080

# MongoDB Configuration
# Local MongoDB (default)
spring.data.mongodb.uri=mongodb://localhost:27017/rescue_management_db

# MongoDB Atlas (uncomment and replace with your Atlas URI if using cloud)
# spring.data.mongodb.uri=mongodb+srv://<username>:<password>@cluster.mongodb.net/rescue_management_db?retryWrites=true&w=majority

# Application
spring.application.name=Rescue Management System

# Logging
logging.level.com.rescue.management=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
